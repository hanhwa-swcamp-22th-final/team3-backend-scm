server:
  port: 8082

spring:
  application:
    name: team3-backend-scm

  profiles:
    include: db, secret

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${SCM_KAFKA_CONSUMER_GROUP_ID:team3-scm}

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.ohgiraffers.team3backendscm
  configuration:
    map-underscore-to-camel-case: true
